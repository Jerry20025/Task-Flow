
<style>
#erd { width: 100%; overflow-x: auto; }
#erd svg { min-width: 900px; }
</style>
<div id="erd"></div>
<script type="module">
import mermaid from 'https://esm.sh/mermaid@11/dist/mermaid.esm.min.mjs';
const dark = matchMedia('(prefers-color-scheme: dark)').matches;
await document.fonts.ready;
mermaid.initialize({
  startOnLoad: false,
  theme: 'base',
  fontFamily: '"Anthropic Sans", sans-serif',
  themeVariables: {
    darkMode: dark,
    fontSize: '13px',
    fontFamily: '"Anthropic Sans", sans-serif',
    lineColor: dark ? '#9c9a92' : '#73726c',
    textColor: dark ? '#c2c0b6' : '#3d3d3a',
    primaryColor: dark ? '#2C2C2A' : '#F1EFE8',
    primaryBorderColor: dark ? '#5F5E5A' : '#888780',
    primaryTextColor: dark ? '#c2c0b6' : '#3d3d3a',
  },
});

const diagram = `erDiagram
  Org {
    uuid org_id PK
    string org_name
    string slug
    uuid owner_id FK
    enum subscription_plan
    enum status
    datetime created_at
    datetime updated_at
  }
  Org_Members {
    uuid org_id FK
    uuid user_id FK
    enum role
    datetime joined_at
  }
  User {
    uuid user_id PK
    string email
    string password_hash
    string first_name
    string last_name
    string avatar_url
    boolean is_verified
    datetime email_verified_at
    datetime last_login_at
    enum status
    datetime created_at
    datetime updated_at
  }
  Project {
    uuid project_id PK
    uuid org_id FK
    string project_key
    string project_name
    string description
    enum status
    datetime start_date
    datetime end_date
    uuid created_by_id FK
    uuid updated_by_id FK
    datetime created_at
    datetime updated_at
  }
  Project_Members {
    uuid project_id FK
    uuid user_id FK
    enum role
    datetime joined_at
  }
  Sprint {
    uuid sprint_id PK
    uuid project_id FK
    string sprint_name
    string goal
    enum status
    datetime start_date
    datetime end_date
    uuid created_by_id FK
    uuid updated_by_id FK
    datetime created_at
    datetime updated_at
  }
  Ticket {
    uuid ticket_id PK
    uuid project_id FK
    uuid sprint_id FK
    uuid parent_ticket_id FK
    string ticket_name
    string description
    enum ticket_type
    enum status
    enum priority
    int story_points
    datetime due_date
    uuid reporter_id FK
    uuid assignee_id FK
    uuid created_by_id FK
    uuid updated_by_id FK
    datetime created_at
    datetime updated_at
  }
  Comment {
    uuid comment_id PK
    uuid ticket_id FK
    uuid author_id FK
    string comment_text
    boolean is_edited
    datetime created_at
    datetime updated_at
  }
  Attachment {
    uuid attachment_id PK
    uuid ticket_id FK
    uuid comment_id FK
    uuid uploaded_by FK
    string file_name
    string file_type
    int file_size
    string file_url
    datetime created_at
  }
  Label {
    uuid label_id PK
    uuid project_id FK
    string label_name
    string color
  }
  Ticket_Label {
    uuid ticket_id FK
    uuid label_id FK
  }
  Activity_Log {
    uuid log_id PK
    enum entity_type
    string entity_id
    enum action
    json old_value
    json new_value
    string activity_description
    uuid performed_by_id FK
    datetime created_at
  }
  API_Key {
    uuid key_id PK
    uuid user_id FK
    uuid org_id FK
    string key_hash
    string name
    enum scope
    boolean is_active
    datetime last_used_at
    datetime expires_at
    datetime created_at
  }

  Org ||--o{ Org_Members : "has"
  User ||--o{ Org_Members : "belongs to"
  Org ||--|| User : "owned by"
  Org ||--o{ Project : "contains"
  Project ||--o{ Project_Members : "has"
  User ||--o{ Project_Members : "member of"
  Project ||--o{ Sprint : "has"
  Project ||--o{ Ticket : "contains"
  Sprint ||--o{ Ticket : "groups"
  Ticket ||--o{ Ticket : "parent of"
  User ||--o{ Ticket : "reports"
  User ||--o{ Ticket : "assigned to"
  Ticket ||--o{ Comment : "has"
  User ||--o{ Comment : "authors"
  Ticket ||--o{ Attachment : "has"
  Comment ||--o{ Attachment : "has"
  Project ||--o{ Label : "owns"
  Ticket ||--o{ Ticket_Label : "tagged with"
  Label ||--o{ Ticket_Label : "applied to"
  User ||--o{ Activity_Log : "performed"
  User ||--o{ API_Key : "owns"
  Org ||--o{ API_Key : "scoped to"
`;

const { svg } = await mermaid.render('erd-svg', diagram);
document.getElementById('erd').innerHTML = svg;

document.querySelectorAll('#erd svg .node').forEach(node => {
  const firstPath = node.querySelector('path[d]');
  if (!firstPath) return;
  const d = firstPath.getAttribute('d');
  const nums = d.match(/-?[\d.]+/g)?.map(Number);
  if (!nums || nums.length < 8) return;
  const xs = [nums[0], nums[2], nums[4], nums[6]];
  const ys = [nums[1], nums[3], nums[5], nums[7]];
  const x = Math.min(...xs), y = Math.min(...ys);
  const w = Math.max(...xs) - x, h = Math.max(...ys) - y;
  const rect = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
  rect.setAttribute('x', x); rect.setAttribute('y', y);
  rect.setAttribute('width', w); rect.setAttribute('height', h);
  rect.setAttribute('rx', '8');
  for (const a of ['fill', 'stroke', 'stroke-width', 'class', 'style']) {
    if (firstPath.hasAttribute(a)) rect.setAttribute(a, firstPath.getAttribute(a));
  }
  firstPath.replaceWith(rect);
});

document.querySelectorAll('#erd svg .row-rect-odd path, #erd svg .row-rect-even path').forEach(p => {
  p.setAttribute('stroke', 'none');
});
</script>
